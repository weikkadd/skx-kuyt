name: Build jar to Release

on:
  push:
    branches: [ main ]
    paths:
      - 'java/pom.xml'
      - 'java/src/main/java/dev/sbxnative/App.java'
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Maven
      run: |
        cd java
        mvn clean package
        
        # 重命名主JAR文件
        mv target/server-1.0.jar server.jar
        ls -la server.jar

    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "java/server.jar"
        tag: ${{ github.ref_name }}
        name: "java"
        token: ${{ secrets.GITHUB_TOKEN }}
        allowUpdates: true
        replacesArtifacts: true
        body: "Automated release from workflow run #${{ github.run_number }}"
